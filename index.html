<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- Security: CSP caps XSS blast radius + blocks framing. style 'unsafe-inline'
       is required (GSAP writes inline styles); script-src stays clean. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cloud.umami.is; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cloud.umami.is; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <title>Mirko Aus — UX Designer</title>
  <meta name="description" content="Senior UX Designer at Remedy Entertainment. Design generalist." />
  <link rel="canonical" href="https://mirkoaus.com/" />
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />

  <!-- Google Fonts: Instrument Serif (display serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <link rel="stylesheet" href="css/project-page.css" />

  <!-- CDN deps pinned with SRI: hash mismatch (CDN compromise / MITM) → script refused -->
  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.min.js" integrity="sha384-qOkzR5Ke/XkQxuGVJ9hpFEpDlcoLtWwVYhnJf06cLIZa2vaIptSqaubivErzmD5O" crossorigin="anonymous"></script>
  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" integrity="sha384-g4NTh/Iv5PPU4xPyhEWqPcwtNXOvdaDI8LLnyYfyNZOjKJeYQyjzQ9X5275eBjpt" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" integrity="sha384-Z3REaz79l2IaAZqJsSABtTbhjgOUYyV3p90XNnAPCSHg3EMTz1fouunq9WZRtj3d" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/Flip.min.js" integrity="sha384-CHvG5TSBYWY4gs18D+se5IrGOZ6r8JlhAWob7LbkaUcfqD8PWzaYz2pqZdH7LsXQ" crossorigin="anonymous"></script>
  <!-- Lenis smooth scroll (@studio-freight build exposes Lenis as a browser global) -->
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js" integrity="sha384-li4UtcFCH6QeUqR4JyV58/VgTprMuz9aauj+oWtew7V4Y7ZVjnvz5px9Y3UCG0Ea" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Black load overlay — covers FOUC, fades out to reveal shader -->
  <div class="load-overlay" aria-hidden="true"></div>

  <!-- Custom cursor -->
  <div class="cursor" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="nav" aria-label="Main navigation">
    <button class="nav__back btn-cta" hidden aria-label="Home">
      <svg class="nav__back-arrow" width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M14 9H4M8 5l-4 4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="nav__back-label">Home</span>
    </button>
    <button class="nav__burger" hidden aria-label="Open menu" aria-expanded="false" aria-controls="project-menu">
      <span class="nav__burger-box" aria-hidden="true">
        <span class="nav__burger-line"></span>
        <span class="nav__burger-line"></span>
        <span class="nav__burger-line"></span>
      </span>
    </button>
    <a class="nav__cta btn-cta" data-c="bWlya28uYXVz" data-d="cHJvdG9uLm1l" aria-label="Send Mirko an email"><span class="btn-label">Contact</span><span class="btn-emoji" aria-hidden="true">&#9993;</span></a>
  </nav>

  <!-- Hero -->
  <section class="hero" id="hero" aria-label="Introduction">
    <h1 class="sr-only">Mirko Aus</h1>
    <p class="hero__tagline">
      Design generalist currently working as<br />
      Senior UX Designer at Remedy Entertainment.
    </p>
    <!-- Five project cards. Three.js takes over in Phase 7. -->
    <div class="hero__cards" aria-hidden="true">
      <div class="hero__card hero__card--1"><img src="assets/images/evocon-cover.png" alt="" /></div>
      <div class="hero__card hero__card--2"><img src="assets/images/alanwake-cover.jpg" alt="" /></div>
      <div class="hero__card hero__card--3"><img src="assets/images/fbc-cover.webp" alt="" /></div>
      <div class="hero__card hero__card--4"><img src="assets/images/cleveron-cover.png" alt="" /></div>
      <div class="hero__card hero__card--5"><img src="assets/images/personal-3.png" alt="" /></div>
    </div>
    <button class="hero__scroll-cue" type="button" aria-label="Scroll to work">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 4v10M5 10l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </section>

  <!-- Work -->
  <section class="work" id="work" aria-label="Work experience">
    <aside class="section-aside">
      <span class="section-label section-label--work">Work</span>
    </aside>
    <div class="section-main"></div>
  </section>

  <!-- Personal Work -->
  <section class="personal-work" id="personal-work" aria-label="Freelance Work">
    <aside class="section-aside">
      <span class="section-label section-label--personal">Freelance Work</span>
    </aside>
    <div class="section-main"></div>
  </section>

  <!-- About / Me -->
  <section class="about" id="about" aria-label="About me">
    <aside class="section-aside">
      <span class="section-label section-label--about">Me</span>
    </aside>
    <div class="section-main">
      <div class="about__content">
        <div class="about__text"></div>
        <div class="about__portrait">
          <img src="assets/images/mirko_profile.jpg" alt="Mirko Aus" loading="lazy" />
        </div>
      </div>
      <!-- Contact CTA — nav button animates to here -->
      <div class="about__actions">
        <a class="about__cta btn-cta" data-c="bWlya28uYXVz" data-d="cHJvdG9uLm1l" aria-label="Send Mirko an email">Contact<span class="btn-emoji" aria-hidden="true">&#9993;</span></a>
        <a class="about__linkedin btn-secondary" href="https://linkedin.com/in/mirko-aus/" target="_blank" rel="noopener" aria-label="Mirko Aus on LinkedIn">LinkedIn<span class="btn-emoji" aria-hidden="true">&#128279;</span></a>
      </div>
    </div>
  </section>

  <!-- Project detail view (hash-routed) -->
  <div id="project-view" hidden></div>

  <div class="gallery-overlay" id="gallery-overlay" role="dialog" aria-modal="true" aria-label="Image gallery" hidden>
    <div class="gallery-overlay__backdrop"></div>
    <button class="gallery-overlay__close btn-cta" aria-label="Close gallery">
      <span aria-hidden="true"></span>
    </button>
    <div class="gallery-overlay__panel">
      <div class="gallery-overlay__main">
        <div class="gallery-overlay__media">
          <img class="gallery-overlay__image" src="" alt="" />
          <p class="gallery-overlay__caption"></p>
        </div>
      </div>
    </div>
    <div class="gallery-overlay__sidebar">
      <div class="gallery-overlay__filmstrip" role="listbox" aria-label="Gallery images"></div>
    </div>
  </div>

  <footer class="footer">
    <span class="footer__copy">&copy; Mirko Aus 2026</span>
  </footer>

  <script type="module" src="js/main.js"></script>

  <!-- Umami analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="140dc33f-ffa1-40a7-b902-d80009bcab99"></script>
</body>
</html>
